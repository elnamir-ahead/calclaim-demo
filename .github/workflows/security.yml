# Security scanning — SAST + dependency audit (enterprise SDLC).
name: Security scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + scanners
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt bandit pip-audit

      - name: Bandit (Python SAST on src/)
        run: bandit -r src -ll

      - name: pip-audit (dependency CVEs)
        run: pip-audit -r requirements.txt --desc on
        continue-on-error: true
