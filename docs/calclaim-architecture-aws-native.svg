<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1180" width="1600" height="1180" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e3a5f"/>
    </marker>
    <marker id="arrow-dim" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#15803d"/>
    </marker>
  </defs>

  <rect width="1600" height="1180" fill="#f1f5f9"/>

  <!-- Header -->
  <rect x="0" y="0" width="1600" height="88" fill="url(#headerGrad)"/>
  <text x="800" y="38" text-anchor="middle" font-size="26" font-weight="700" fill="#f8fafc">CalcClaim AWS Reference Architecture</text>
  <text x="800" y="62" text-anchor="middle" font-size="13" fill="#94a3b8">API Gateway, Lambda, LangGraph, Bedrock, DynamoDB | MCP sidecar | LangSmith + CloudWatch | Enterprise controls</text>
  <text x="800" y="78" text-anchor="middle" font-size="11" fill="#64748b">Navitus-style agentic adjudication demo | See docs/ARCHITECTURE.md</text>

  <!-- Swimlane backgrounds -->
  <rect x="32" y="100" width="1046" height="920" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#cardShadow)"/>
  <rect x="1094" y="100" width="474" height="920" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#cardShadow)"/>

  <text x="48" y="124" font-size="12" font-weight="700" fill="#475569">PRIMARY PATH (north to south)</text>
  <text x="1110" y="124" font-size="12" font-weight="700" fill="#475569">CROSS-CUTTING</text>

  <!-- Step badges helper: circles drawn inline -->

  <!-- 1 API GW -->
  <circle cx="72" cy="156" r="14" fill="#c2410c"/>
  <text x="72" y="161" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>
  <rect x="96" y="136" width="966" height="56" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="120" y="158" font-size="15" font-weight="700" fill="#9a3412">Amazon API Gateway</text>
  <text x="120" y="176" font-size="10" fill="#7c2d12">HTTP API v2 | Optional JWT authorizer (Terraform/CDK) or public routes | CORS | Throttle | $default stage</text>
  <text x="120" y="188" font-size="9" fill="#a16207">GET /health without JWT when authorizer enabled | ANY /{proxy+} to Lambda</text>
  <line x1="579" y1="192" x2="579" y2="212" stroke="#1e3a5f" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 2 Lambda -->
  <circle cx="72" cy="244" r="14" fill="#4f46e5"/>
  <text x="72" y="249" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2</text>
  <rect x="96" y="216" width="966" height="64" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="120" y="238" font-size="15" font-weight="700" fill="#3730a3">AWS Lambda (Python 3.12)</text>
  <text x="120" y="256" font-size="10" fill="#4338ca">Handler: lambda.handler.handler | Mangum ASGI | FastAPI | Correlation-ID + optional JWT (REQUIRE_AUTH) | LOG_FORMAT json/text</text>
  <text x="120" y="270" font-size="9" fill="#6366f1">TRUST_API_GATEWAY_AUTH=true when API GW validates JWT | boto3: Bedrock, DynamoDB, SNS</text>
  <line x1="579" y1="280" x2="579" y2="300" stroke="#1e3a5f" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 3 LangGraph -->
  <circle cx="72" cy="354" r="14" fill="#2563eb"/>
  <text x="72" y="359" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">3</text>
  <rect x="96" y="304" width="966" height="200" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="328" font-size="15" font-weight="700" fill="#1e40af">LangGraph StateGraph (in-process)</text>
  <text x="120" y="346" font-size="10" fill="#1d4ed8">Nodes: pii_scrub | phi_access_check | supervisor (Haiku) | routed specialists</text>
  <text x="120" y="362" font-size="10" fill="#1d4ed8">Claims path: agentcore_calcclaim (InvokeAgent) | mcp_tools (HTTP to MCP) | claims_agent (Sonnet)</text>
  <text x="120" y="378" font-size="10" fill="#1d4ed8">Alt paths: formulary_agent (Haiku) | compliance_agent (Sonnet) - no AgentCore/MCP</text>
  <text x="120" y="394" font-size="10" fill="#1d4ed8">policy_gate | hitl_gate (SNS) | guardrail_check | audit | response</text>
  <rect x="112" y="404" width="934" height="88" rx="8" fill="#ffffff" stroke="#93c5fd"/>
  <text x="579" y="428" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Bedrock SDK usage inside graph</text>
  <text x="579" y="446" text-anchor="middle" font-size="9" fill="#475569">Converse (Claude 3.5 Sonnet / Haiku) | bedrock-agent-runtime InvokeAgent | ApplyGuardrail</text>
  <text x="579" y="462" text-anchor="middle" font-size="9" fill="#475569">Policy: inline engine OR OPA (USE_OPA + OPA_SERVER_URL + policies/calclaim.rego)</text>
  <text x="579" y="478" text-anchor="middle" font-size="9" fill="#64748b">State carries: correlation_id, session_id, safe_claim, mcp_tool_results, audit_event_ids</text>

  <!-- Deny branch -->
  <line x1="180" y1="380" x2="130" y2="448" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5 4"/>
  <polygon points="124,458 130,448 136,458" fill="#dc2626"/>
  <rect x="72" y="462" width="100" height="36" rx="18" fill="#fee2e2" stroke="#dc2626"/>
  <text x="122" y="484" text-anchor="middle" font-size="9" font-weight="700" fill="#991b1b">End denied</text>

  <line x1="579" y1="504" x2="579" y2="524" stroke="#1e3a5f" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 4 Bedrock -->
  <circle cx="72" cy="548" r="14" fill="#1d4ed8"/>
  <text x="72" y="553" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">4</text>
  <rect x="96" y="528" width="620" height="52" rx="10" fill="#dbeafe" stroke="#2563eb"/>
  <text x="406" y="550" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Amazon Bedrock</text>
  <text x="406" y="566" text-anchor="middle" font-size="9" fill="#334155">Models + Guardrails + Agents (AgentCore) | All calls from Lambda VPC / public subnet per your design</text>

  <!-- MCP box -->
  <rect x="730" y="528" width="332" height="100" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="896" y="552" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">MCP server (separate)</text>
  <text x="896" y="570" text-anchor="middle" font-size="9" fill="#14532d">FastMCP | streamable HTTP / stdio | ECS Fargate or internal ALB</text>
  <text x="896" y="586" text-anchor="middle" font-size="9" fill="#14532d">CALCLAIM_MCP_URL | MCP_ALLOWED_HOSTS / SCHEMES | optional MCP_BEARER_TOKEN</text>
  <text x="896" y="602" text-anchor="middle" font-size="9" fill="#15803d">Not behind API Gateway for adjudication - tool plane only</text>
  <line x1="730" y1="420" x2="820" y2="528" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-green)"/>
  <text x="790" y="468" font-size="8" fill="#166534">mcp_tools node</text>

  <line x1="406" y1="580" x2="406" y2="600" stroke="#1e3a5f" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 5 Data -->
  <circle cx="72" cy="624" r="14" fill="#db2777"/>
  <text x="72" y="629" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">5</text>
  <rect x="96" y="604" width="620" height="48" rx="10" fill="#fdf2f8" stroke="#db2777"/>
  <text x="406" y="626" text-anchor="middle" font-size="13" font-weight="700" fill="#9d174d">Persistence + HITL</text>
  <text x="406" y="642" text-anchor="middle" font-size="9" fill="#831843">DynamoDB: calclaim-claims, audit-log, sessions | SNS: HITL topic | S3 (CDK) for WORM archive pattern</text>

  <line x1="406" y1="652" x2="406" y2="672" stroke="#1e3a5f" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 6 Response -->
  <circle cx="72" cy="696" r="14" fill="#0284c7"/>
  <text x="72" y="701" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">6</text>
  <rect x="96" y="676" width="620" height="44" rx="10" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="406" y="698" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">JSON response to client</text>
  <text x="406" y="714" text-anchor="middle" font-size="9" fill="#0c4a6e">final_response: status, pricing, workflow_steps, correlation_id, agentcore_*, mcp_tool_results</text>

  <!-- 7 Optional Textract -->
  <circle cx="72" y="762" r="14" fill="#22c55e"/>
  <text x="72" y="767" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">7</text>
  <rect x="96" y="736" width="966" height="76" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text x="120" y="760" font-size="12" font-weight="700" fill="#166534">Optional: document ingestion (design extension)</text>
  <text x="120" y="778" font-size="10" fill="#15803d">S3 upload (fax / scan) | Amazon Textract (OCR + forms) | normalize Lambda | POST same /claims/adjudicate</text>
  <text x="120" y="794" font-size="9" fill="#3f6212">Not implemented in demo repo - shows where imaging fits in enterprise rollout</text>

  <!-- Enterprise strip -->
  <rect x="96" y="828" width="966" height="92" rx="10" fill="#faf5ff" stroke="#9333ea" stroke-width="1.2"/>
  <text x="120" y="852" font-size="12" font-weight="700" fill="#6b21a8">Enterprise controls (implemented)</text>
  <text x="120" y="870" font-size="9" fill="#7c3aed">JWT: REQUIRE_AUTH + JWT_JWKS_URL | API GW JWT + TRUST_API_GATEWAY_AUTH | CORS_ALLOW_ORIGINS</text>
  <text x="120" y="886" font-size="9" fill="#7c3aed">OPA: USE_OPA + OPA_SERVER_URL + policies/calclaim.rego | CI: Bandit + pip-audit (security.yml) | Dependabot</text>
  <text x="120" y="902" font-size="9" fill="#7c3aed">MCP allowlist | X-Ray optional (aws-xray-sdk) | JSON logs with correlation_id</text>

  <!-- Right column: LangSmith -->
  <rect x="1110" y="140" width="442" height="96" rx="10" fill="#fffbeb" stroke="#d97706" stroke-dasharray="6 4"/>
  <text x="1331" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">LangSmith</text>
  <text x="1331" y="192" text-anchor="middle" font-size="10" fill="#78350f">LangChain Cloud - traces, datasets, eval</text>
  <text x="1331" y="208" text-anchor="middle" font-size="9" fill="#a16207">LANGCHAIN_TRACING_V2 + API key | Complements CloudWatch (not a replacement)</text>
  <line x1="1110" y1="190" x2="1000" y2="360" stroke="#d97706" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow-dim)"/>

  <!-- Observability stack -->
  <text x="1110" y="268" font-size="13" font-weight="700" fill="#1e293b">AWS observability</text>
  <rect x="1110" y="278" width="442" height="46" rx="8" fill="#f8fafc" stroke="#64748b"/>
  <text x="1331" y="298" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Amazon CloudWatch</text>
  <text x="1331" y="312" text-anchor="middle" font-size="8" fill="#64748b">Lambda logs / metrics / alarms</text>
  <rect x="1110" y="332" width="442" height="46" rx="8" fill="#f8fafc" stroke="#64748b"/>
  <text x="1331" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">AWS X-Ray</text>
  <text x="1331" y="366" text-anchor="middle" font-size="8" fill="#64748b">Active tracing + optional SDK patch</text>
  <rect x="1110" y="386" width="442" height="46" rx="8" fill="#f8fafc" stroke="#64748b"/>
  <text x="1331" y="406" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">AWS CloudTrail</text>
  <text x="1331" y="420" text-anchor="middle" font-size="8" fill="#64748b">API control-plane audit</text>
  <rect x="1110" y="440" width="442" height="50" rx="8" fill="#f8fafc" stroke="#64748b"/>
  <text x="1331" y="462" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Amazon EventBridge</text>
  <text x="1331" y="478" text-anchor="middle" font-size="8" fill="#64748b">Ops events to SIEM / automation</text>

  <line x1="1110" y1="360" x2="620" y2="248" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="850" y="280" font-size="8" fill="#64748b">telemetry</text>

  <!-- IaC note -->
  <rect x="1110" y="510" width="442" height="100" rx="10" fill="#f1f5f9" stroke="#475569"/>
  <text x="1331" y="538" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Infrastructure as code</text>
  <text x="1331" y="558" text-anchor="middle" font-size="9" fill="#475569">terraform/: Lambda zip, API GW, DDB, SNS</text>
  <text x="1331" y="574" text-anchor="middle" font-size="9" fill="#475569">infrastructure/cdk/: full stacks + optional JWT</text>
  <text x="1331" y="590" text-anchor="middle" font-size="9" fill="#475569">.github/workflows: deploy-aws.yml, security.yml</text>

  <!-- Legend -->
  <rect x="1110" y="628" width="442" height="200" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1331" y="656" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Legend</text>
  <line x1="1130" y1="672" x2="1180" y2="672" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1190" y="676" font-size="9" fill="#475569">Primary data / control flow</text>
  <line x1="1130" y1="692" x2="1180" y2="692" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-green)"/>
  <text x="1190" y="696" font-size="9" fill="#475569">MCP HTTP (tool plane)</text>
  <line x1="1130" y1="712" x2="1180" y2="712" stroke="#d97706" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dim)"/>
  <text x="1190" y="716" font-size="9" fill="#475569">LangSmith trace export</text>
  <line x1="1130" y1="732" x2="1180" y2="732" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="1190" y="736" font-size="9" fill="#475569">Metrics / logs to CloudWatch</text>
  <rect x="1130" y="748" width="50" height="16" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-dasharray="4 2"/>
  <text x="1190" y="760" font-size="9" fill="#475569">Optional / future path</text>
  <rect x="1130" y="772" width="50" height="16" rx="4" fill="#faf5ff" stroke="#9333ea"/>
  <text x="1190" y="784" font-size="9" fill="#475569">Security / governance strip</text>

  <text x="1331" y="812" text-anchor="middle" font-size="8" fill="#64748b">Export PNG: cairosvg, Inkscape, or browser print</text>

  <!-- Footer -->
  <text x="800" y="1148" text-anchor="middle" font-size="10" fill="#64748b">Vector: docs/calclaim-architecture-aws-native.svg | Raster: docs/calclaim-architecture-aws-native.png</text>
  <text x="800" y="1166" text-anchor="middle" font-size="9" fill="#94a3b8">Version: enterprise detail view | March 2026</text>
</svg>
